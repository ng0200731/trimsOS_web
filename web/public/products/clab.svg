<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>
  <rect x="60" y="60" width="1080" height="680" rx="16" fill="#ffffff" stroke="#ededed" stroke-width="1.5"/>
  <path d="M76 60 H1124 a16 16 0 0 1 16 16 V112 H60 V76 a16 16 0 0 1 16 -16 Z" fill="#fafafa"/>
  <line x1="60" y1="112" x2="1140" y2="112" stroke="#ededed" stroke-width="1.5"/>
  <circle cx="92" cy="86" r="5" fill="#d9d9d9"/><circle cx="112" cy="86" r="5" fill="#d9d9d9"/><circle cx="132" cy="86" r="5" fill="#d9d9d9"/>
  <text x="600" y="91" text-anchor="middle" font-size="14" fill="#737373">CLAB — Care Label Studio</text>

  <!-- artboard / care label -->
  <rect x="110" y="170" width="430" height="330" rx="6" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>
  <text x="130" y="206" font-size="13" fill="#3d3d3d" font-weight="600">100% COTTON</text>
  <rect x="130" y="220" width="220" height="7" rx="2" fill="#e0e0e0"/>
  <rect x="130" y="236" width="180" height="7" rx="2" fill="#e8e8e8"/>
  <rect x="130" y="252" width="200" height="7" rx="2" fill="#e8e8e8"/>
  <!-- care symbols row -->
  <g fill="none" stroke="#525252" stroke-width="1.5">
    <circle cx="140" cy="300" r="13"/><path d="M133 300 H147"/>
    <rect x="166" y="289" width="24" height="22" rx="2"/><path d="M170 289 V283 H186 V289"/>
    <path d="M212 304 l8 -14 8 14 Z"/><path d="M220 300 V292"/>
    <circle cx="266" cy="300" r="13"/><path d="M259 293 l14 14"/><path d="M273 293 l-14 14"/>
  </g>
  <!-- barcode -->
  <g fill="#171717">
    <rect x="130" y="340" width="3" height="60"/><rect x="137" y="340" width="2" height="60"/><rect x="142" y="340" width="4" height="60"/><rect x="149" y="340" width="2" height="60"/><rect x="154" y="340" width="3" height="60"/><rect x="160" y="340" width="5" height="60"/><rect x="168" y="340" width="2" height="60"/><rect x="173" y="340" width="3" height="60"/>
  </g>
  <!-- QR block -->
  <g fill="#171717">
    <rect x="400" y="330" width="100" height="100" fill="#ffffff" stroke="#e8e8e8"/>
    <rect x="410" y="340" width="24" height="24"/><rect x="466" y="340" width="24" height="24"/><rect x="410" y="396" width="24" height="24"/>
    <rect x="416" y="346" width="12" height="12" fill="#ffffff"/><rect x="472" y="346" width="12" height="12" fill="#ffffff"/><rect x="416" y="402" width="12" height="12" fill="#ffffff"/>
    <rect x="446" y="346" width="6" height="6"/><rect x="458" y="358" width="6" height="6"/><rect x="440" y="372" width="6" height="6"/><rect x="452" y="384" width="6" height="6"/>
  </g>

  <!-- selection bounding box with handles -->
  <rect x="98" y="200" width="454" height="160" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <rect x="92" y="194" width="12" height="12" fill="#0a0a0a"/><rect x="546" y="194" width="12" height="12" fill="#0a0a0a"/><rect x="92" y="354" width="12" height="12" fill="#0a0a0a"/><rect x="546" y="354" width="12" height="12" fill="#0a0a0a"/>

  <!-- right: variable data panel -->
  <text x="610" y="190" font-size="12" fill="#9a9a9a" font-weight="600" letter-spacing="1">VARIABLE DATA</text>
  <g>
    <rect x="610" y="206" width="470" height="42" rx="8" fill="#ffffff" stroke="#ededed"/>
    <text x="626" y="223" font-size="11" fill="#9a9a9a">Brand</text>
    <rect x="626" y="230" width="160" height="8" rx="2" fill="#525252"/>

    <rect x="610" y="258" width="470" height="42" rx="8" fill="#ffffff" stroke="#ededed"/>
    <text x="626" y="275" font-size="11" fill="#9a9a9a">Size / Material</text>
    <rect x="626" y="282" width="220" height="8" rx="2" fill="#525252"/>

    <rect x="610" y="310" width="470" height="42" rx="8" fill="#ffffff" stroke="#ededed"/>
    <text x="626" y="327" font-size="11" fill="#9a9a9a">Care copy</text>
    <rect x="626" y="334" width="300" height="8" rx="2" fill="#525252"/>
  </g>

  <!-- export pills -->
  <g>
    <rect x="610" y="690" width="100" height="40" rx="20" fill="#0a0a0a"/>
    <text x="660" y="715" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">Export .ai</text>
    <rect x="722" y="690" width="100" height="40" rx="20" fill="#ffffff" stroke="#d9d9d9"/>
    <text x="772" y="715" text-anchor="middle" font-size="13" fill="#171717" font-weight="600">Export PDF</text>
  </g>
</svg>
