<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>
  <rect x="60" y="60" width="1080" height="680" rx="16" fill="#ffffff" stroke="#ededed" stroke-width="1.5"/>
  <path d="M76 60 H1124 a16 16 0 0 1 16 16 V112 H60 V76 a16 16 0 0 1 16 -16 Z" fill="#0a0a0a"/>
  <line x1="60" y1="112" x2="1140" y2="112" stroke="#0a0a0a" stroke-width="1.5"/>
  <circle cx="92" cy="86" r="5" fill="#525252"/><circle cx="112" cy="86" r="5" fill="#525252"/><circle cx="132" cy="86" r="5" fill="#525252"/>
  <text x="600" y="91" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="600">AI QC — Real-time Line Inspection</text>

  <!-- LIVE pill -->
  <rect x="100" y="138" width="66" height="24" rx="12" fill="#0a0a0a"/>
  <circle cx="116" cy="150" r="4" fill="#ffffff"/>
  <text x="128" y="154" font-size="11" fill="#ffffff" font-weight="700" letter-spacing="1">LIVE</text>

  <!-- camera viewport -->
  <rect x="100" y="180" width="600" height="480" rx="12" fill="#f7f7f7" stroke="#ededed"/>

  <!-- care label under inspection -->
  <rect x="320" y="270" width="160" height="200" rx="8" fill="#ffffff" stroke="#d9d9d9" stroke-width="1.5"/>
  <rect x="334" y="288" width="110" height="7" rx="2" fill="#525252"/>
  <rect x="334" y="303" width="78" height="6" rx="2" fill="#e0e0e0"/>
  <rect x="334" y="315" width="96" height="6" rx="2" fill="#e8e8e8"/>
  <g fill="none" stroke="#525252" stroke-width="1.5"><circle cx="346" cy="350" r="11"/><path d="M340 350 h12"/></g>
  <g fill="#171717">
    <rect x="334" y="372" width="2" height="34"/><rect x="339" y="372" width="3" height="34"/><rect x="344" y="372" width="2" height="34"/><rect x="349" y="372" width="4" height="34"/><rect x="355" y="372" width="2" height="34"/><rect x="360" y="372" width="3" height="34"/>
  </g>
  <g>
    <rect x="420" y="372" width="42" height="42" fill="#ffffff" stroke="#e8e8e8"/>
    <rect x="426" y="378" width="12" height="12" fill="#171717"/><rect x="448" y="378" width="10" height="10" fill="#171717"/><rect x="426" y="400" width="10" height="10" fill="#171717"/>
  </g>

  <!-- detection boxes (pass) -->
  <g fill="none" stroke="#0a0a0a" stroke-width="1.5">
    <rect x="330" y="368" width="78" height="48"/>
    <rect x="416" y="368" width="50" height="50"/>
  </g>
  <g fill="#0a0a0a" stroke="none"><circle cx="330" cy="368" r="9"/><circle cx="416" cy="368" r="9"/></g>
  <g fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M326 368 l3 3 l6 -7"/><path d="M412 368 l3 3 l6 -7"/>
  </g>

  <!-- flagged defect (dashed) -->
  <rect x="328" y="280" width="120" height="36" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="328" cy="280" r="9" fill="#0a0a0a"/>
  <g fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"><path d="M325 277 l6 6 M331 277 l-6 6"/></g>
  <rect x="452" y="272" width="76" height="16" rx="3" fill="#0a0a0a"/>
  <text x="490" y="284" text-anchor="middle" font-size="9" fill="#ffffff" font-weight="700" letter-spacing="1">FLAGGED</text>

  <!-- scan beam -->
  <line x1="112" y1="450" x2="688" y2="450" stroke="#0a0a0a" stroke-width="6" stroke-opacity="0.06"/>
  <line x1="112" y1="450" x2="688" y2="450" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="2 7"/>

  <!-- viewport caption -->
  <text x="120" y="630" font-size="12" fill="#9a9a9a">CAM 01 · Care-label line · 60 labels/min</text>

  <!-- right stats panel -->
  <rect x="720" y="180" width="380" height="480" rx="12" fill="#ffffff" stroke="#ededed"/>
  <text x="744" y="218" font-size="12" fill="#9a9a9a" font-weight="700" letter-spacing="1">TODAY</text>
  <text x="744" y="282" font-size="46" font-weight="600" fill="#0a0a0a">99.7%</text>
  <text x="744" y="308" font-size="13" fill="#737373">pass rate · 4,812 labels scanned</text>
  <line x1="744" y1="332" x2="1076" y2="332" stroke="#ededed"/>

  <text x="744" y="392" font-size="13" fill="#525252"><tspan font-size="24" font-weight="600" fill="#0a0a0a">14</tspan><tspan dx="8">defects caught</tspan></text>

  <text x="744" y="442" font-size="12" fill="#9a9a9a" font-weight="700" letter-spacing="1">DEFECTS / HOUR</text>
  <g>
    <rect x="744" y="550" width="36" height="60" rx="3" fill="#ededed"/>
    <rect x="792" y="530" width="36" height="80" rx="3" fill="#ededed"/>
    <rect x="840" y="500" width="36" height="110" rx="3" fill="#d9d9d9"/>
    <rect x="888" y="560" width="36" height="50" rx="3" fill="#ededed"/>
    <rect x="936" y="520" width="36" height="90" rx="3" fill="#ededed"/>
    <rect x="984" y="540" width="36" height="70" rx="3" fill="#ededed"/>
    <rect x="1032" y="558" width="36" height="52" rx="3" fill="#0a0a0a"/>
  </g>

  <line x1="744" y1="624" x2="1076" y2="624" stroke="#ededed"/>
  <text x="744" y="648" font-size="12" fill="#737373">Validated against CLAB layouts in real time</text>
</svg>
