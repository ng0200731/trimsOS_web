<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>
  <rect x="60" y="60" width="1080" height="680" rx="16" fill="#ffffff" stroke="#ededed" stroke-width="1.5"/>
  <path d="M76 60 H1124 a16 16 0 0 1 16 16 V112 H60 V76 a16 16 0 0 1 16 -16 Z" fill="#0a0a0a"/>
  <line x1="60" y1="112" x2="1140" y2="112" stroke="#0a0a0a" stroke-width="1.5"/>
  <circle cx="92" cy="86" r="5" fill="#525252"/><circle cx="112" cy="86" r="5" fill="#525252"/><circle cx="132" cy="86" r="5" fill="#525252"/>
  <text x="600" y="91" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="600">ECO-CRM — Orders &amp; Production</text>

  <!-- KPI row -->
  <g>
    <rect x="100" y="140" width="240" height="90" rx="10" fill="#ffffff" stroke="#ededed"/>
    <text x="118" y="168" font-size="12" fill="#9a9a9a" font-weight="600" letter-spacing="0.5">OPEN QUOTES</text>
    <text x="118" y="206" font-size="30" font-weight="600" fill="#0a0a0a">24</text>
    <text x="322" y="206" text-anchor="end" font-size="12" fill="#0a0a0a">+6</text>

    <rect x="360" y="140" width="240" height="90" rx="10" fill="#ffffff" stroke="#ededed"/>
    <text x="378" y="168" font-size="12" fill="#9a9a9a" font-weight="600" letter-spacing="0.5">ACTIVE ORDERS</text>
    <text x="378" y="206" font-size="30" font-weight="600" fill="#0a0a0a">86</text>
    <text x="582" y="206" text-anchor="end" font-size="12" fill="#0a0a0a">+12</text>

    <rect x="620" y="140" width="240" height="90" rx="10" fill="#ffffff" stroke="#ededed"/>
    <text x="638" y="168" font-size="12" fill="#9a9a9a" font-weight="600" letter-spacing="0.5">REVENUE / QTR</text>
    <text x="638" y="206" font-size="30" font-weight="600" fill="#0a0a0a">$128k</text>
    <text x="842" y="206" text-anchor="end" font-size="12" fill="#0a0a0a">+18%</text>

    <rect x="880" y="140" width="220" height="90" rx="10" fill="#ffffff" stroke="#ededed"/>
    <text x="898" y="168" font-size="12" fill="#9a9a9a" font-weight="600" letter-spacing="0.5">ON-TIME</text>
    <text x="898" y="206" font-size="30" font-weight="600" fill="#0a0a0a">96%</text>
    <text x="1082" y="206" text-anchor="end" font-size="12" fill="#0a0a0a">+3%</text>
  </g>

  <!-- chart panel -->
  <rect x="100" y="250" width="680" height="410" rx="12" fill="#ffffff" stroke="#ededed"/>
  <text x="124" y="288" font-size="13" font-weight="600" fill="#0a0a0a">Orders this quarter</text>
  <text x="124" y="308" font-size="12" fill="#9a9a9a">care labels shipped by month</text>
  <g fill="#ededed">
    <rect x="150" y="560" width="50" height="60" rx="3"/>
    <rect x="225" y="540" width="50" height="80" rx="3"/>
    <rect x="300" y="520" width="50" height="100" rx="3"/>
    <rect x="375" y="500" width="50" height="120" rx="3" fill="#d9d9d9"/>
    <rect x="450" y="510" width="50" height="110" rx="3"/>
    <rect x="525" y="480" width="50" height="140" rx="3"/>
    <rect x="600" y="495" width="50" height="125" rx="3"/>
    <rect x="675" y="465" width="50" height="155" rx="3" fill="#0a0a0a"/>
