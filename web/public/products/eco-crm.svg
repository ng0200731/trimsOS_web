  <text x="824" y="308" font-size="12" fill="#9a9a9a">QR-tracked, live</text>

  <!-- order rows -->
  <g>
    <!-- row 1 -->
    <line x1="824" y1="330" x2="1076" y2="330" stroke="#f2f2f2"/>
    <text x="824" y="356" font-size="13" font-weight="600" fill="#0a0a0a">#1042</text>
    <text x="864" y="356" font-size="11" fill="#9a9a9a">Care labels · 5k</text>
    <g fill="none" stroke="#0a0a0a"><rect x="824" y="364" width="8" height="8" rx="1"/></g>
    <!-- QR mini -->
    <g fill="#171717"><rect x="1048" y="340" width="26" height="26" fill="#ffffff" stroke="#ededed"/><rect x="1053" y="345" width="6" height="6"/><rect x="1063" y="345" width="5" height="5"/><rect x="1053" y="355" width="5" height="5"/></g>
    <!-- stage dots: cut sew qc pack -->
    <g><circle cx="828" cy="380" r="4" fill="#0a0a0a"/><circle cx="852" cy="380" r="4" fill="#0a0a0a"/><circle cx="876" cy="380" r="4" fill="#0a0a0a"/><circle cx="900" cy="380" r="4" fill="none" stroke="#d9d9d9" stroke-width="1.5"/></g>
    <text x="918" y="384" font-size="10" fill="#737373">QC</text>
  </g>
  <g>
    <line x1="824" y1="402" x2="1076" y2="402" stroke="#f2f2f2"/>
    <text x="824" y="428" font-size="13" font-weight="600" fill="#0a0a0a">#1041</text>
    <text x="864" y="428" font-size="11" fill="#9a9a9a">Hang tags · 12k</text>
    <g fill="#171717"><rect x="1048" y="412" width="26" height="26" fill="#ffffff" stroke="#ededed"/><rect x="1053" y="417" width="6" height="6"/><rect x="1063" y="417" width="5" height="5"/><rect x="1053" y="427" width="5" height="5"/></g>
    <g><circle cx="828" cy="452" r="4" fill="#0a0a0a"/><circle cx="852" cy="452" r="4" fill="#0a0a0a"/><circle cx="876" cy="452" r="4" fill="none" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="900" cy="452" r="4" fill="none" stroke="#d9d9d9" stroke-width="1.5"/></g>
    <text x="918" y="456" font-size="10" fill="#737373">Sew</text>
  </g>
  <g>
    <line x1="824" y1="474" x2="1076" y2="474" stroke="#f2f2f2"/>
    <text x="824" y="500" font-size="13" font-weight="600" fill="#0a0a0a">#1040</text>
    <text x="864" y="500" font-size="11" fill="#9a9a9a">Woven · 3k</text>
    <g fill="#171717"><rect x="1048" y="484" width="26" height="26" fill="#ffffff" stroke="#ededed"/><rect x="1053" y="489" width="6" height="6"/><rect x="1063" y="489" width="5" height="5"/><rect x="1053" y="499" width="5" height="5"/></g>
    <g><circle cx="828" cy="524" r="4" fill="#0a0a0a"/><circle cx="852" cy="524" r="4" fill="#0a0a0a"/><circle cx="876" cy="524" r="4" fill="#0a0a0a"/><circle cx="900" cy="524" r="4" fill="#0a0a0a"/></g>
    <text x="918" y="528" font-size="10" fill="#0a0a0a" font-weight="600">Done</text>
  </g>
  <g>
    <line x1="824" y1="546" x2="1076" y2="546" stroke="#f2f2f2"/>
    <text x="824" y="572" font-size="13" font-weight="600" fill="#0a0a0a">#1039</text>
    <text x="864" y="572" font-size="11" fill="#9a9a9a">Stickers · 30k</text>
    <g fill="#171717"><rect x="1048" y="556" width="26" height="26" fill="#ffffff" stroke="#ededed"/><rect x="1053" y="561" width="6" height="6"/><rect x="1063" y="561" width="5" height="5"/><rect x="1053" y="571" width="5" height="5"/></g>
    <g><circle cx="828" cy="596" r="4" fill="#0a0a0a"/><circle cx="852" cy="596" r="4" fill="none" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="876" cy="596" r="4" fill="none" stroke="#d9d9d9" stroke-width="1.5"/><circle cx="900" cy="596" r="4" fill="none" stroke="#d9d9d9" stroke-width="1.5"/></g>
    <text x="918" y="600" font-size="10" fill="#737373">Cut</text>
